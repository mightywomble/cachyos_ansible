---
- name: Install communication and messaging applications
  tags: communication_apps
  block:
    # Pacman packages
    - name: Install pacman communication apps
      become: true
      pacman:
        name:
          - extra/discord
          - extra/proton-vpn-gtk-app
        state: present
        update_cache: "{{ pacman_update_cache }}"

    # CachyOS repo packages
    - name: Install CachyOS communication apps
      become: true
      pacman:
        name:
          - cachyos/proton-pass
        state: present

    # AUR/Paru packages
    - name: Install AUR communication apps via paru
      become: true
      become_user: "{{ ansible_facts.user_id }}"
      command: "paru -S --noconfirm {{ item }}"
      loop:
        - aur/microsoft-edge-stable-bin
        - aur/spotify
        - slack-desktop
        - aur/youtube-music-desktop-v2-git
        - netbird-bin
        - netbird-ui-bin
      register: paru_install_result
      failed_when: paru_install_result.rc not in [0, 1]
      changed_when: "'error' not in paru_install_result.stdout | lower"
